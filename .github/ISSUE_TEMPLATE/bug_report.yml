name: Bug Report
description: Report a bug in TernaryPhysics
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Do not report security vulnerabilities here.** Email security@ternaryphysics.com instead.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: Describe the bug
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `ternaryphysics ...`
        2. Wait for ...
        3. Observe error
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - BPF/Kernel
        - Userspace/Training
        - CLI
        - Deployment
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Kernel version, distro, hardware, etc.
      placeholder: |
        - Kernel: 6.1.0
        - Distro: Ubuntu 24.04
        - NIC: Intel X710
        - Python: 3.11
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant logs or error messages
      render: shell
